# yaml-language-server: $schema=https://yamlresume.dev/schema.json
#
# YAMLResume provides a builtin schema to validate resumes and help avoid lots
# of low level mistakes.
#
# You need to install https://github.com/redhat-developer/yaml-language-server
# in order to get the best editing experience in your choice of editor/IDE.
#
# ref:
# - https://yamlresume.dev/docs/compiler/schema
# - https://yamlresume.dev/docs/compiler/schema/json

---
content:
  basics:
    name: 安迪·杜弗雷恩
    headline: 向着太平洋前行
    phone: "(213) 555-9876"
    email: hi@ppresume.com
    url: https://ppresume.com/gallery
    # All summary fields supports a limited rich text capabilities in markdown
    # syntax:
    #
    # - bold, (e.g, `**bold**`)
    # - italic, (e.g, `*italic*`)
    # - ordered list, unordored list and nested sub list
    # - links (e.g. `[link](https://ppresume.com)`)
    summary: |
      - 计算机科学专业，在数据结构、算法和软件开发方面有扎实的基础
      - 像素级全栈 Web 开发者，专注于创建高质量、视觉效果出色的网站
      - 熟悉数据库（SQL、NoSQL），了解服务端技术（Node.js、Express 等）
      - 注重细节的团队合作者，对设计和用户体验有敏锐的洞察力
  location:
    address: 主街 123 号
    city: 萨克拉门托
    region: 加利福尼亚
    country: United States
    postalCode: "95814"
  profiles:
    - network: Line
      url: https://line.com/PPResumeX
      username: PPResumeX
    - network: Twitter
      url: https://twitter.com/PPResumeX
      username: PPResumeX
  education:
    - institution: 南加州大学
      url: https://www.cs.usc.edu/
      # Valid degree options:
      #
      # - 'Middle School'
      # - 'High School'
      # - 'Diploma'
      # - 'Associate'
      # - 'Bachelor'
      # - 'Master'
      # - 'Doctor'
      degree: Bachelor
      area: 计算机工程与计算机科学
      score: "3.8"
      # Should be a valid date string that can be parsed by `new Date(dateStr)`
      # in JavaScript, eg. '2020-01', '2020-02-03', 'Jul 1, 2023' etc.
      #
      # The date part would be removed in the final output as most of the time
      # people won't really care about the exact date for your working
      # experience or education background, etc.
      # ref: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/Date
      startDate: Sep 1, 2016
      # Leave endDate blank to indicate "Present"
      endDate: Jul 1, 2020
      courses:
        - 离散数学
        - 编程语言概念
        - 数据结构与面向对象设计
        - 操作系统
        - 计算机体系结构
        - 数据库系统
        - 计算机网络
        - 计算理论导论
      summary: |
        - 熟练掌握 Java、C++ 和 Python 等编程语言
        - 通过多个项目和课程作业积累了丰富的软件开发实践经验
        - 通过小组项目和课堂演示培养了良好的沟通和团队协作能力
  work:
    - name: PPResume
      url: https://ppresume.com
      startDate: Dec 1, 2022
      endDate:
      position: 高级软件工程师
      summary: |
        - 开发和实现高效、可扩展的代码，确保 Web 应用程序的高质量和可维护性
        - 与跨职能团队协作，收集项目需求并将其转化为技术方案
        - 进行全面的测试和调试，识别并解决软件中的问题和缺陷
        - 积极参与代码审查，提供有价值的反馈以提高代码质量和最佳实践的遵循
        - 指导初级开发人员，营造协作和成长导向的团队氛围
      keywords:
        - Scalability
        - Growth
        - Quality
        - Mentorship
    - name: PPResume
      url: https://ppresume.com
      startDate: Sep 1, 2020
      endDate: Dec 1, 2022
      position: 软件工程师
      summary: |
        - 创建可复用的 React 组件，确保代码效率和可维护性
        - 集成 RESTful API 以在前端获取和展示动态数据
        - 使用 React Router 实现客户端路由，实现页面间的流畅导航
        - 积极参与敏捷开发方法论，参加每日站会和迭代规划会议
      keywords:
        - RESTful
        - React
        - Agile
  languages:
    # Valid language fluency options:
    #
    # - 'Elementary Proficiency'
    # - 'Limited Working Proficiency'
    # - 'Minimum Professional Proficiency'
    # - 'Full Professional Proficiency'
    # - 'Native or Bilingual Proficiency'
    - language: English
      fluency: Native or Bilingual Proficiency
      keywords:
        - TOEFL 110
        - IELTS 7.5
    - language: Chinese
      fluency: Elementary Proficiency
      keywords: []
  skills:
    # Valid level options:
    #
    # - 'Novice'
    # - 'Beginner'
    # - 'Intermediate'
    # - 'Advanced'
    # - 'Expert'
    # - 'Master'
    - name: Web 开发
      level: Expert
      keywords:
        - Python
        - Ruby
        - CSS
        - React
        - JavaScript
    - name: 运维
      level: Intermediate
      keywords:
        - Python
        - Kubernetes
        - Docker
        - Shell
        - Ansible
    - name: 设计
      level: Intermediate
      keywords:
        - Sketch
        - Figma
        - Photoshop
  awards:
    - title: 院长荣誉名单
      awarder: 南加州大学
      date: Oct 2016
      summary: |
        授予在学期内通过保持规定的绩点（GPA）而取得优异学业成绩的学生。
  certificates:
    - name: AWS 认证开发者 - 助理级
      url: https://aws.amazon.com/certification/
      issuer: AWS
      date: Mar 2021
  publications:
    - publisher: ACM 交互式智能系统汇刊
      url: https://dl.acm.org/journal/tiis
      name: 通过增强现实技术提升人机交互体验
      releaseDate: Dec 2017
      summary: |
        - 探索增强现实（AR）在改善人机交互方面的潜力
        - 阐述 AR 在游戏、教育、医疗和设计等领域的优势
        - 讨论 AR 技术在提升用户体验方面的挑战和未来方向
  references:
    - name: 阿曼达·雷诺兹博士
      phone: "(555) 123-4567"
      relationship: 计算机科学教授
      email: amanda.reynolds@usc.edu
      summary: |
        安迪·杜弗雷恩展示了出色的问题解决能力和对编程概念的深刻理解，他将为任何加入的团队或组织带来巨大的价值。
  projects:
    - name: EduWeb
      url: https://www.eduweb.xyz/
      description: 基于 Web 的互动学习教育平台
      startDate: Sep 2016
      endDate: Dec 2016
      summary: |
        - 旨在提升在线学习体验
        - 通过互动功能和用户友好的界面促进学生的参与和协作
        - 提供涵盖多个学科的丰富课程
        - 致力于通过 Web 技术改善学生的学习方式
      keywords:
        - Education
        - Online Learning
        - HCI
  interests:
    - name: 体育运动
      keywords:
        - 足球
        - 游泳
        - 骑行
        - 徒步
    - name: 音乐
      keywords:
        - 钢琴
        - 吉他
  volunteer:
    - organization: 南加州大学计算机科学与工程学会
      url: https://www.usccsesociety.org/
      position: 技术导师
      startDate: Sep 2015
      endDate: Jul 2023
      summary: |
        - 在南加州大学计算机科学与工程学会担任技术导师志愿者
        - 为同学们的技术项目和课程作业提供指导和帮助
        - 协助组织学会成员的研讨会、编程竞赛和社交活动
        - 致力于在学生社区中营造协作和互助的氛围

# Top-level locale setting
locale:
  # Use `yamlresume languages list` to get the list of supported languages
  language: zh-hans

# Multiple output layouts configuration
layouts:
  - engine: latex
    page:
      margins:
        top: 2.5cm
        left: 1.5cm
        right: 1.5cm
        bottom: 2.5cm
      showPageNumbers: true
    # Use `yamlresume templates list` to get the list of available templates
    template: moderncv-banking
    typography:
      # LaTeX engine only supports 10pt, 11pt, and 12pt
      fontSize: 11pt
  - engine: markdown
  - engine: html
    # Use `yamlresume templates list` to get the list of available templates
    template: calm
    typography:
      # HTML engine only supports font size in px unit, from 10px to 24px
      fontSize: 16px
